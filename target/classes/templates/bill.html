<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generated Bill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <main class="container py-4">
      <div class="bill-paper mx-auto" th:if="${bill}">
        <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
          <div>
            <p class="eyebrow mb-1">Generated Bill</p>
            <h1 class="h3">Smart Food Stall</h1>
            <p class="text-muted mb-0" th:text="${#temporals.format(bill.createdAt, 'dd MMM yyyy, hh:mm a')}">Date</p>
          </div>
          <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">New Bill</a>
        </div>

        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${bill.items}">
                <td th:text="${item.itemName}">Burger</td>
                <td th:text="${item.quantity}">2</td>
                <td th:text="${'₹' + item.price}">₹80</td>
                <td th:text="${'₹' + item.lineTotal}">₹160</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="bill-totals">
          <div><span>Subtotal</span><strong th:text="${'₹' + bill.subtotal}">₹0</strong></div>
          <div><span>GST</span><strong th:text="${'₹' + bill.gst}">₹0</strong></div>
          <div class="grand"><span>Grand Total</span><strong th:text="${'₹' + bill.grandTotal}">₹0</strong></div>
        </div>

        <button class="btn btn-success w-100 mt-3" onclick="window.print()">Print Bill</button>
      </div>

      <div class="alert alert-warning" th:unless="${bill}">
        Bill details expired. Please generate a new bill.
        <a th:href="@{/}">Go back</a>
      </div>
    </main>
  </body>
</html>
