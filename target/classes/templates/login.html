<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <p class="eyebrow mb-1">Admin Panel</p>
      <h1 class="h3 mb-3">Login</h1>
      <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label class="form-label" for="username">Username</label>
        <input id="username" class="form-control mb-3" name="username" required />
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-control mb-3" type="password" name="password" required />
        <button class="btn btn-success w-100" type="submit">Login</button>
      </form>
      <a class="d-inline-block mt-3" th:href="@{/}">Back to customer side</a>
    </main>
  </body>
</html>
