<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Food Stall Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">Smart Food Stall Billing System</a>
        <a class="btn btn-light btn-sm" th:href="@{/admin}">Admin Panel</a>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
        <div>
          <p class="eyebrow mb-1">Customer Side</p>
          <h1 class="h3 mb-1">Select Food Items</h1>
          <p class="text-muted mb-0">Quantity choose karo, total live calculate hoga.</p>
        </div>
        <div class="form-check form-switch">
          <input id="gstSwitch" class="form-check-input" type="checkbox" name="gstEnabled" form="orderForm" checked />
          <label class="form-check-label" for="gstSwitch">GST 5%</label>
        </div>
      </div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form id="orderForm" th:action="@{/bill/generate}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row g-4">
          <section class="col-lg-8">
            <div class="row g-3">
              <div class="col-sm-6 col-xl-4" th:each="item : ${items}">
                <article class="food-card h-100">
                  <div>
                    <h2 class="h5" th:text="${item.name}">Burger</h2>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                      <strong class="price" th:text="${'₹' + item.price}">₹80</strong>
                      <span class="stock" th:text="${item.stockQuantity + ' in stock'}">40 in stock</span>
                    </div>
                  </div>
                  <div class="quantity-control mt-3">
                    <button class="qty-btn" type="button" data-action="minus">-</button>
                    <input class="qty-input" type="number" min="0" th:max="${item.stockQuantity}" value="0"
                           th:name="${'quantities[' + item.id + ']'}"
                           th:data-price="${item.price}" th:data-name="${item.name}" />
                    <button class="qty-btn" type="button" data-action="plus">+</button>
                  </div>
                </article>
              </div>
            </div>
          </section>

          <aside class="col-lg-4">
            <div class="summary-panel">
              <p class="eyebrow mb-1">Live Bill</p>
              <h2 class="h4">Order Summary</h2>
              <div id="billRows" class="bill-rows empty">No items selected yet.</div>
              <div class="total-line"><span>Subtotal</span><strong id="subtotalText">₹0.00</strong></div>
              <div class="total-line"><span>GST</span><strong id="gstText">₹0.00</strong></div>
              <div class="total-line grand"><span>Grand Total</span><strong id="grandText">₹0.00</strong></div>
              <button class="btn btn-success w-100 mt-3" type="submit">Generate Bill</button>
            </div>
          </aside>
        </div>
      </form>
    </main>

    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
