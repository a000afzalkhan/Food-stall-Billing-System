<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
        <div class="d-flex gap-2">
          <a class="btn btn-light btn-sm" th:href="@{/}">Customer Side</a>
          <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
        <div>
          <p class="eyebrow mb-1">Admin Dashboard</p>
          <h1 class="h3 mb-0">Manage Menu & Sales</h1>
        </div>
      </div>

      <section class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="stat-card"><span>Today's Sales</span><strong th:text="${'₹' + todaySales}">₹0</strong></div>
        </div>
        <div class="col-md-4">
          <div class="stat-card"><span>Total Bills</span><strong th:text="${totalBills}">0</strong></div>
        </div>
        <div class="col-md-4">
          <div class="stat-card"><span>Total Items</span><strong th:text="${items.size()}">0</strong></div>
        </div>
      </section>

      <div class="row g-4">
        <section class="col-lg-3">
          <div class="panel">
            <h2 class="h5 mb-3">Add New Food Item</h2>
            <form th:action="@{/admin/items}" th:object="${newItem}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <label class="form-label">Name</label>
              <input class="form-control mb-3" th:field="*{name}" required />
              <label class="form-label">Price</label>
              <input class="form-control mb-3" type="number" min="1" step="0.01" th:field="*{price}" required />
              <label class="form-label">Stock Quantity</label>
              <input class="form-control mb-3" type="number" min="0" th:field="*{stockQuantity}" required />
              <button class="btn btn-success w-100" type="submit">Add Item</button>
            </form>
          </div>
        </section>

        <section class="col-lg-9">
          <div class="panel">
            <h2 class="h5 mb-3">Food Items</h2>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="item : ${items}">
                    <td colspan="4">
                      <form class="admin-row" th:action="@{/admin/items/{id}/update(id=${item.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input class="form-control" name="name" th:value="${item.name}" required />
                        <input class="form-control" name="price" type="number" min="1" step="0.01" th:value="${item.price}" required />
                        <input class="form-control" name="stockQuantity" type="number" min="0" th:value="${item.stockQuantity}" required />
                        <div class="admin-actions">
                          <button class="btn btn-success btn-sm" type="submit">Save</button>
                          <button class="btn btn-outline-success btn-sm" type="submit" th:formaction="@{/admin/items/{id}/price-up(id=${item.id})}">Price +</button>
                          <button class="btn btn-outline-warning btn-sm" type="submit" th:formaction="@{/admin/items/{id}/price-down(id=${item.id})}">Price -</button>
                          <button class="btn btn-outline-danger btn-sm" type="submit" th:formaction="@{/admin/items/{id}/delete(id=${item.id})}">Delete</button>
                        </div>
                      </form>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </div>

      <section class="panel mt-4">
        <h2 class="h5 mb-3">Recent Bills</h2>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Bill ID</th>
                <th>Date & Time</th>
                <th>Items</th>
                <th>Grand Total</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="bill : ${recentBills}">
                <td th:text="${bill.id}">1</td>
                <td th:text="${#temporals.format(bill.createdAt, 'dd MMM yyyy, hh:mm a')}">Date</td>
                <td th:text="${bill.items.size()}">2</td>
                <td th:text="${'₹' + bill.grandTotal}">₹0</td>
              </tr>
              <tr th:if="${recentBills.isEmpty()}">
                <td colspan="4" class="text-muted text-center">No bills generated yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
